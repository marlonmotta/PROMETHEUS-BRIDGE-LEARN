<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PBL - PROMETHEUS · BRIDGE · LEARN</title>
  </head>
  <body class="bg-bg text-txt font-sans h-screen overflow-hidden flex">
    <div id="root" class="flex w-full h-full">
      <!-- Loading screen (replaced when React mounts) -->
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #0d0d14;
          gap: 24px;
          animation: fadeIn 0.4s ease;
          z-index: 9999;
        "
      >
        <div
          style="
            font-size: 14px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #8b5cf6;
            opacity: 0.6;
            font-weight: 500;
          "
        >
          PROMETHEUS
        </div>
        <div
          style="
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #e2e2f0;
            text-shadow: 0 0 60px rgba(139, 92, 246, 0.35);
          "
        >
          BRIDGE · LEARN
        </div>
        <div
          style="
            width: 36px;
            height: 36px;
            border: 3px solid #1a1a2e;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-top: 20px;
          "
        ></div>
        <div
          style="
            font-size: 11px;
            color: #444;
            margin-top: 12px;
            letter-spacing: 3px;
            font-weight: 500;
          "
        >
          v0.2.0
        </div>
        <style>
          @keyframes spin {
            to {
              transform: rotate(360deg);
            }
          }
          @keyframes fadeIn {
            from {
              opacity: 0;
            }
            to {
              opacity: 1;
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
